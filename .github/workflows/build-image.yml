name: Publish image

on:
  workflow_dispatch:
  push:
    tags: ["platform-v*"]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate application manifest
        run: ./scripts/generate-apps.py
      - name: Read version lock
        id: versions
        run: |
          echo "frappe_ref=$(python -c 'import json; print(json.load(open("config/versions.json"))["frappe"]["ref"])')" >> "$GITHUB_OUTPUT"
          echo "docker_ref=$(python -c 'import json; print(json.load(open("config/versions.json"))["frappe_docker"]["ref"])')" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          repository: frappe/frappe_docker
          ref: ${{ steps.versions.outputs.docker_ref }}
          path: .frappe-docker
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/loopjet-llc/loopjet-frappe-suite
          tags: |
            type=ref,event=tag
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: .frappe-docker
          file: .frappe-docker/images/layered/Containerfile
          push: true
          platforms: linux/amd64
          build-args: |
            FRAPPE_PATH=https://github.com/loopjet-llc/loopjet-frappe.git
            FRAPPE_BRANCH=${{ steps.versions.outputs.frappe_ref }}
          secret-files: |
            apps_json=${{ github.workspace }}/config/apps.generated.json
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
